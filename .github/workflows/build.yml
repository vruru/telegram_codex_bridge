name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...

  release-archives:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install UPX
        run: |
          if command -v upx >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx
      - name: Build cross-platform archives
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          COMMIT: ${{ github.sha }}
          UPX_ENABLED: "true"
        run: ./scripts/build-release-archives.sh
      - uses: actions/upload-artifact@v7
        with:
          name: telegram-codex-bridge-release-archives
          path: dist/releases/*.tar.gz

  macos-app:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build macOS app
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          COMMIT: ${{ github.sha }}
        run: ./scripts/build-macos-app.sh
      - name: Build macOS dmg
        run: ./scripts/build-macos-dmg.sh
      - name: Zip macOS app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Telegram Codex Bridge.app" "dist/Telegram Codex Bridge.app.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: telegram-codex-bridge-macos
          path: |
            dist/Telegram Codex Bridge.dmg
            dist/Telegram Codex Bridge.app.zip

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - release-archives
      - macos-app
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: telegram-codex-bridge-release-archives
          path: dist/release-assets/archives
      - uses: actions/download-artifact@v8
        with:
          name: telegram-codex-bridge-macos
          path: dist/release-assets/macos
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(
            dist/release-assets/archives/*.tar.gz
            dist/release-assets/macos/*.dmg
            dist/release-assets/macos/*.zip
          )

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were found." >&2
            exit 1
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG_NAME" \
            -f target_commitish="$TARGET_SHA" \
            --jq .body > "$notes_file"

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes-file "$notes_file" \
              --draft=false \
              --latest
            gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes-file "$notes_file" \
              --latest
          fi
