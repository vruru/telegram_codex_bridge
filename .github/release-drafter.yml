name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## Summary

  $CHANGES

  ## Notes

  - Built artifacts for Linux and macOS are attached to this release.
  - If a pull request says `Fixes #123` or `Closes #123`, GitHub will keep the issue linkage on the release page and merged PR timeline.

categories:
  - title: Features
    labels:
      - feature
      - enhancement
      - feat
  - title: Fixes
    labels:
      - fix
      - bug
      - bugfix
  - title: Maintenance
    labels:
      - chore
      - refactor
      - ci
      - build
  - title: Other Changes
    labels:
      - "*"

change-template: '- $TITLE by @$AUTHOR in #$NUMBER'
change-title-escapes: '\<*_&'
no-changes-template: '- No user-facing changes were categorized for this release.'

version-resolver:
  major:
    labels:
      - major
      - semver:major
  minor:
    labels:
      - feature
      - enhancement
      - feat
      - minor
      - semver:minor
  patch:
    labels:
      - fix
      - bug
      - bugfix
      - patch
      - semver:patch
      - chore
      - refactor
      - ci
      - build
  default: patch

exclude-labels:
  - skip-changelog

autolabeler:
  - label: ci
    files:
      - '.github/workflows/**'
  - label: build
    files:
      - 'scripts/**'
  - label: enhancement
    files:
      - 'internal/app/**'
      - 'internal/telegram/**'
      - 'internal/codex/**'
  - label: feature
    branch:
      - '/^feature\/.+/'
      - '/^feat\/.+/'
  - label: fix
    branch:
      - '/^fix\/.+/'
      - '/^bugfix\/.+/'
